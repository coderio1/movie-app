<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Movie Database</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #e94560;
            margin-bottom: 2rem;
        }

        .cards {
            list-style: none;
            margin: 0 auto;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            max-width: 1200px;
        }

        .card {
            background-color: #16213e;
            border-radius: 0.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            width: 200px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card__poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background-color: #0f3460;
        }

        .card__poster--placeholder {
            width: 100%;
            height: 300px;
            background-color: #0f3460;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .card__body {
            padding: 0.75rem;
            flex: 1;
        }

        .card__title {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0 0 0.4rem 0;
            color: #eee;
        }

        .card__year {
            font-size: 0.8rem;
            color: #aaa;
            margin: 0 0 0.4rem 0;
        }

        .card__rating {
            font-size: 0.9rem;
            color: #f5c518;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Cinema Movie Database</h1>
    <ul class="cards">
        __REPLACE_MOVIE_CARDS__
    </ul>
</body>
</html>
